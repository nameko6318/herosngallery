<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>コスファイ図鑑 - 戦記版</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --accent-color: #af52de;
            --win-color: #ffcc00; /* ゴールド */
            --lose-color: #7a7a7a; /* グレー */
            --draw-color: #34c759; /* グリーン */
            --danger-color: #ff3b30;
            --border-radius-large: 18px;
            --border-radius-small: 12px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);

            --color-atk: #ff453a;
            --color-def: #30d158;
            --color-spd: #0a84ff;
            --color-int: #ffd60a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: calc(60px + var(--safe-top));
            padding-bottom: calc(80px + var(--safe-bottom));
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: calc(60px + var(--safe-top));
            padding-top: var(--safe-top); background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 16px; padding-right: 16px; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100;
        }

        .btn { border: none; background: none; font-size: 16px; font-weight: 600; color: var(--accent-color); padding: 8px 14px; border-radius: var(--border-radius-small); cursor: pointer; }
        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-danger { color: var(--danger-color); }

        main { padding: 16px; max-width: 500px; margin: 0 auto; }
        .search-input { width: 100%; padding: 14px 16px; font-size: 16px; border: none; background-color: rgba(142, 142, 147, 0.15); border-radius: var(--border-radius-small); outline: none; margin-bottom: 16px; }

        /* --- リスト表示 --- */
        .list-container { display: flex; flex-direction: column; gap: 24px; }

        .card {
            background: var(--card-bg); border-radius: var(--border-radius-large); overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; transition: all 0.3s ease;
        }

        /* --- 勝ち数が多い時の演出（覇者） --- */
        .card.cool-mode {
            border: 3px solid var(--win-color);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }
        .card.cool-mode::after {
            content: "👑 覇者"; position: absolute; top: 10px; right: 10px;
            background: var(--win-color); color: #000; font-size: 12px; font-weight: 800;
            padding: 4px 8px; border-radius: 6px; z-index: 10;
        }

        /* --- 負け数が多い時の演出（不様） --- */
        .card.shame-mode {
            filter: grayscale(0.5) sepia(0.2);
            border: 2px solid #555;
        }
        .card.shame-mode::after {
            content: "💀 敗北者"; position: absolute; top: 10px; right: 10px;
            background: #000; color: #fff; font-size: 10px; font-weight: 800;
            padding: 4px 8px; border-radius: 6px; z-index: 10; opacity: 0.7;
        }

        .card-img-wrapper {
            width: 100%; height: 320px; background-color: #ffffff; /* 背景を白に修正 */
            display: flex; align-items: center; justify-content: center;
        }
        .card img { width: 100%; height: 100%; object-fit: contain; }
        .card-info { padding: 16px; }
        .card-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .card-stats-summary { font-size: 13px; font-weight: 700; color: var(--text-sub); }

        /* --- モーダル --- */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { width: 100%; background: var(--card-bg); border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px 20px calc(30px + var(--safe-bottom)); max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s; }
        .modal.active .modal-content { transform: translateY(0); }
        
        /* --- フォームと詳細表示 --- */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #e5e5ea; border-radius: var(--border-radius-small); background: #fafafa; outline: none; }
        textarea.form-control { height: 100px; }

        .image-picker { width: 100%; height: 200px; border: 2px dashed #ccc; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fff; cursor: pointer; }
        .image-picker img { width: 100%; height: 100%; object-fit: contain; background: #fff; }

        /* 詳細用装飾 */
        .detail-img-box { width: 100%; height: 350px; background: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 1px solid #f2f2f7; }
        .detail-img-box img { width: 100%; height: 100%; object-fit: contain; }

        /* 戦績表示 */
        .record-box { display: flex; gap: 10px; margin-bottom: 20px; text-align: center; }
        .record-item { flex: 1; padding: 10px; border-radius: 12px; background: #f2f2f7; }
        .record-val { font-size: 24px; font-weight: 900; display: block; }
        .record-label { font-size: 12px; color: var(--text-sub); }

        /* 戦闘履歴（特大表示） */
        .history-header { font-size: 48px; font-weight: 900; text-align: center; letter-spacing: -1px; margin-bottom: 10px; }
        .history-win { color: var(--win-color); text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .history-lose { color: var(--lose-color); filter: grayscale(1); }
        .history-draw { color: var(--draw-color); }

        .info-block { background: #f9f9f9; padding: 16px; border-radius: 12px; margin-bottom: 16px; border-left: 4px solid var(--accent-color); }
        .info-title { font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 5px; }
        .info-text { font-size: 15px; color: #333; white-space: pre-wrap; }

        .status-bar-bg { width: 100%; height: 8px; background: #e5e5ea; border-radius: 4px; overflow: hidden; margin: 4px 0 12px; }
        .status-bar-fill { height: 100%; width: 0; transition: width 0.6s ease; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">⚔️ コスファイ戦記</h1>
        <button class="btn btn-primary" onclick="openFormModal()">新規参戦</button>
    </header>

    <main>
        <input type="text" id="searchInput" class="search-input" placeholder="名前・戦績・能力を検索..." oninput="renderList()">
        
        <div id="itemCount" style="font-size:12px; color:var(--text-sub); margin-bottom:10px;">0 Fighters</div>
        <div id="listContainer" class="list-container"></div>
    </main>

    <div id="formModal" class="modal" onclick="if(event.target.id==='formModal')closeModal('formModal')">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="formTitle">キャラクター登録</span>
                <button class="btn" onclick="closeModal('formModal')">戻る</button>
            </div>
            <form id="zukanForm" onsubmit="saveItem(event)">
                <input type="hidden" id="itemId">
                <div class="form-group">
                    <label>全身画像</label>
                    <div class="image-picker" onclick="document.getElementById('fileInput').click()">
                        <span id="pickerText">画像をアップロード</span>
                        <img id="previewImg" src="" style="display:none;">
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
                </div>
                <div class="form-group">
                    <label>名前・二つ名</label>
                    <input type="text" id="itemTitle" class="form-control" placeholder="例: 虚ろの蒼 ギルバート" required>
                </div>
                <div class="form-group">
                    <label>テーマ</label>
                    <input type="text" id="itemTheme" class="form-control" placeholder="例: サイバー忍者">
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;"><label>勝ち数</label><input type="number" id="winCount" class="form-control" value="0"></div>
                    <div style="flex:1;"><label>負け数</label><input type="number" id="lossCount" class="form-control" value="0"></div>
                </div>
                <div class="form-group">
                    <label>直近の戦闘結果</label>
                    <select id="lastResult" class="form-control">
                        <option value="WIN">勝利 (VICTORY)</option>
                        <option value="LOSE">敗北 (DEFEAT)</option>
                        <option value="DRAW">引き分け (DRAW)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>詳細な戦闘履歴（物語）</label>
                    <textarea id="battleLog" class="form-control" placeholder="過去の戦いのエピソードを記述..."></textarea>
                </div>
                <div class="form-group">
                    <label>ステータス (ATK / DEF / SPD / INT)</label>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="statAtk" class="form-control" placeholder="ATK" value="50">
                        <input type="number" id="statDef" class="form-control" placeholder="DEF" value="50">
                        <input type="number" id="statSpd" class="form-control" placeholder="SPD" value="50">
                        <input type="number" id="statInt" class="form-control" placeholder="INT" value="50">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:16px; margin-top:10px;">刻銘を保存</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="if(event.target.id==='detailModal')closeModal('detailModal')">
        <div class="modal-content">
            <div id="historyHeader" class="history-header">RESULT</div>
            <div class="detail-img-box"><img id="detailImg" src=""></div>
            
            <h2 id="detailName" style="font-size:24px; font-weight:900; margin-bottom:5px;">名前</h2>
            <div id="detailTheme" style="font-size:14px; color:var(--accent-color); font-weight:700; margin-bottom:20px;">テーマ</div>

            <div class="record-box">
                <div class="record-item" style="color:var(--win-color);"><span id="detailWins" class="record-val">0</span><span class="record-label">WINS</span></div>
                <div class="record-item" style="color:var(--lose-color);"><span id="detailLosses" class="record-val">0</span><span class="record-label">LOSSES</span></div>
            </div>

            <div id="statSection" style="margin-bottom:20px;">
                </div>

            <div class="info-block">
                <div class="info-title">HISTORY LOG</div>
                <div id="detailBattleLog" class="info-text">戦いの記録はありません。</div>
            </div>

            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1; background:#eee;" id="editBtn">修整</button>
                <button class="btn btn-danger" style="flex:1; background:#fff0f0;" id="deleteBtn">抹消</button>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = "CosfiBattleDB";
        const STORE_NAME = "characters";
        let db = null;
        let charData = [];

        window.onload = () => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
            };
            request.onsuccess = (e) => { db = e.target.result; fetchAll(); };
        };

        function fetchAll() {
            const store = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME);
            const req = store.getAll();
            req.onsuccess = () => { charData = req.result; renderList(); };
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = "";

            const filtered = charData.filter(c => c.title.toLowerCase().includes(keyword) || c.theme.toLowerCase().includes(keyword));
            document.getElementById('itemCount').textContent = `${filtered.length} Fighters`;

            filtered.sort((a,b) => b.id - a.id).forEach(c => {
                const card = document.createElement('div');
                const winRate = c.wins > c.losses;
                const shameMode = c.losses > c.wins;
                
                card.className = `card ${winRate ? 'cool-mode' : ''} ${shameMode ? 'shame-mode' : ''}`;
                card.onclick = () => openDetail(c.id);

                card.innerHTML = `
                    <div class="card-img-wrapper"><img src="${c.image || 'https://via.placeholder.com/300?text=No+Image'}"></div>
                    <div class="card-info">
                        <div class="card-title">${c.title}</div>
                        <div class="card-stats-summary">${c.wins}W - ${c.losses}L / Theme: ${c.theme}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 1200;
                    if(w > h) { if(w > max) { h *= max/w; w = max; } }
                    else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const b64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('previewImg').src = b64;
                    document.getElementById('previewImg').style.display = "block";
                    document.getElementById('pickerText').style.display = "none";
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveItem(e) {
            e.preventDefault();
            const id = document.getElementById('itemId').value;
            const item = {
                title: document.getElementById('itemTitle').value,
                theme: document.getElementById('itemTheme').value,
                wins: Number(document.getElementById('winCount').value),
                losses: Number(document.getElementById('lossCount').value),
                lastResult: document.getElementById('lastResult').value,
                battleLog: document.getElementById('battleLog').value,
                atk: document.getElementById('statAtk').value,
                def: document.getElementById('statDef').value,
                spd: document.getElementById('statSpd').value,
                int: document.getElementById('statInt').value,
                image: document.getElementById('previewImg').src
            };
            const trans = db.transaction(STORE_NAME, "readwrite");
            if (id) { item.id = Number(id); trans.objectStore(STORE_NAME).put(item); }
            else { trans.objectStore(STORE_NAME).add(item); }
            trans.oncomplete = () => { closeModal('formModal'); fetchAll(); };
        }

        function openDetail(id) {
            const c = charData.find(x => x.id === id);
            const head = document.getElementById('historyHeader');
            head.textContent = c.lastResult || "RESULT";
            head.className = "history-header " + 
                (c.lastResult === 'WIN' ? 'history-win' : c.lastResult === 'LOSE' ? 'history-lose' : 'history-draw');

            document.getElementById('detailImg').src = c.image;
            document.getElementById('detailName').textContent = c.title;
            document.getElementById('detailTheme').textContent = c.theme;
            document.getElementById('detailWins').textContent = c.wins;
            document.getElementById('detailLosses').textContent = c.losses;
            document.getElementById('detailBattleLog').textContent = c.battleLog || "戦闘記録はありません。";

            const stats = [
                {label: 'ATK', val: c.atk, col: 'var(--color-atk)'},
                {label: 'DEF', val: c.def, col: 'var(--color-def)'},
                {label: 'SPD', val: c.spd, col: 'var(--color-spd)'},
                {label: 'INT', val: c.int, col: 'var(--color-int)'}
            ];
            document.getElementById('statSection').innerHTML = stats.map(s => `
                <div style="font-size:12px; font-weight:800; display:flex; justify-content:space-between;">
                    <span>${s.label}</span><span>${s.val}</span>
                </div>
                <div class="status-bar-bg"><div class="status-bar-fill" style="width:${s.val}%; background:${s.col}"></div></div>
            `).join('');

            document.getElementById('editBtn').onclick = () => openEdit(c);
            document.getElementById('deleteBtn').onclick = () => {
                if(confirm("このキャラクターの存在を抹消しますか？")) {
                    db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(c.id).oncomplete = () => { closeModal('detailModal'); fetchAll(); };
                }
            };
            openModal('detailModal');
        }

        function openEdit(c) {
            closeModal('detailModal');
            document.getElementById('formTitle').textContent = "刻銘の修整";
            document.getElementById('itemId').value = c.id;
            document.getElementById('itemTitle').value = c.title;
            document.getElementById('itemTheme').value = c.theme;
            document.getElementById('winCount').value = c.wins;
            document.getElementById('lossCount').value = c.losses;
            document.getElementById('lastResult').value = c.lastResult;
            document.getElementById('battleLog').value = c.battleLog;
            document.getElementById('statAtk').value = c.atk;
            document.getElementById('statDef').value = c.def;
            document.getElementById('statSpd').value = c.spd;
            document.getElementById('statInt').value = c.int;
            document.getElementById('previewImg').src = c.image;
            document.getElementById('previewImg').style.display = "block";
            document.getElementById('pickerText').style.display = "none";
            openModal('formModal');
        }

        function openFormModal() {
            document.getElementById('formTitle').textContent = "キャラクター参戦";
            document.getElementById('itemId').value = "";
            document.getElementById('zukanForm').reset();
            document.getElementById('previewImg').style.display = "none";
            document.getElementById('pickerText').style.display = "block";
            openModal('formModal');
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
