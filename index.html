<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>コスファイ戦記</title>
    <style>
        :root {
            --bg-color: #f2f2f7; --card-bg: #ffffff; --text-main: #1c1c1e; --text-sub: #8e8e93;
            --accent-color: #af52de; --danger-color: #ff3b30;
            --border-radius-large: 18px; --border-radius-small: 12px;
            --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
            --color-god: linear-gradient(45deg, #ff007f, #7f00ff, #00bfff, #ffe600);
            --color-cool: #ffcc00; --color-draw: #af52de; --color-struggle: #8e8e93; --color-abyss: #1c1c1e;
            --color-atk: #ff453a; --color-def: #30d158; --color-spd: #0a84ff; --color-int: #ffd60a;
        }

        html, body { overscroll-behavior-y: contain; height: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-top: calc(70px + var(--safe-top)); padding-bottom: calc(80px + var(--safe-bottom)); }

        header { position: fixed; top: 0; left: 0; right: 0; height: calc(70px + var(--safe-top)); padding-top: var(--safe-top); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding-left: 16px; padding-right: 16px; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100; }
        header h1 { font-size: 18px; font-weight: 900; cursor: pointer; }

        .btn { border: none; background: none; font-size: 14px; font-weight: 600; color: var(--accent-color); padding: 8px 12px; border-radius: var(--border-radius-small); cursor: pointer; }
        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-danger { color: var(--danger-color); }
        .btn-secondary { background-color: #e5e5ea; color: #1c1c1e; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        main { padding: 16px; max-width: 500px; margin: 0 auto; }
        .search-input { width: 100%; padding: 14px 16px; font-size: 16px; border: none; background-color: rgba(142, 142, 147, 0.15); border-radius: var(--border-radius-small); outline: none; margin-bottom: 16px; }

        .list-container { display: flex; flex-direction: column; gap: 24px; }
        .card { background: var(--card-bg); border-radius: var(--border-radius-large); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border: 3px solid transparent; cursor: pointer; }
        
        .card.mode-god { border-image: var(--color-god) 3; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); }
        .card.mode-god::after { content: "👑 不敗神話"; position: absolute; top: 12px; right: 12px; background: black; color: #fff; font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 6px; border: 1px solid #ff007f; }
        .card.mode-cool { border-color: var(--color-cool); box-shadow: 0 0 15px rgba(255,204,0,0.3); }
        .card.mode-cool::after { content: "🥇 覇者"; position: absolute; top: 12px; right: 12px; background: var(--color-cool); color: #000; font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; }
        .card.mode-draw { border-color: var(--color-draw); }
        .card.mode-draw::after { content: "⚔️ 宿敵"; position: absolute; top: 12px; right: 12px; background: var(--color-draw); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; }
        .card.mode-struggle { border-color: var(--color-struggle); }
        .card.mode-struggle::after { content: "🩹 苦戦"; position: absolute; top: 12px; right: 12px; background: var(--color-struggle); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; }
        .card.mode-abyss { border-color: #ff3b30; background: #fafafa; filter: saturate(0.6); }
        .card.mode-abyss::after { content: "💀 奈落"; position: absolute; top: 12px; right: 12px; background: #000; color: #ff3b30; font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 6px; }

        body.effects-off .card { border-color: transparent !important; border-image: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important; filter: none !important; }
        body.effects-off .card::after { display: none !important; }
        body.effects-off .history-card img { filter: none !important; box-shadow: none !important; border-color: #e5e5ea !important; }

        .card-img-wrapper { width: 100%; height: 320px; background-color: #ffffff; display: flex; align-items: center; justify-content: center; }
        .card img { width: 100%; height: 100%; object-fit: contain; }
        .card-info { padding: 16px; }
        .card-title { font-size: 18px; font-weight: 800; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { width: 100%; background: var(--card-bg); border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 16px 16px calc(30px + var(--safe-bottom)); max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s; }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: #48484a; }
        .form-control { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #e5e5ea; border-radius: var(--border-radius-small); background: #fafafa; outline: none; }
        
        .dynamic-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .skill-tag { display: inline-block; background: var(--color-cool); color: #000; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right: 6px; margin-bottom: 6px; }
        .weakness-tag { display: inline-block; background: #3a3a3c; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right: 6px; margin-bottom: 6px; }

        .image-list-builder { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px; }
        .image-thumb-box { position: relative; aspect-ratio: 1; border: 1px solid #e5e5ea; border-radius: 8px; overflow: hidden; background: #fff; }
        .image-thumb-box img { width: 100%; height: 100%; object-fit: contain; }
        .del-thumb-btn { position: absolute; top: 2px; right: 2px; background: rgba(255,59,48,0.8); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: bold; }

        .detail-img-slider { width: 100%; height: 340px; background: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; border: 1px solid #e5e5ea; position: relative; }
        .detail-img-slider img { width: 100%; height: 100%; object-fit: contain; }
        .slide-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; }

        .dynamic-history-row { background: #f2f2f7; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e5e5ea; }
        .history-card { background: #fff; padding: 16px; border-radius: 14px; margin-bottom: 16px; border: 2px solid #e5e5ea; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .history-title-large { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 4px; letter-spacing: 1px; }
        .battle-title-display { font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 12px; color: #1c1c1e; border-bottom: 2px solid #e5e5ea; padding-bottom: 8px; }
        
        .history-card.result-WIN .history-title-large { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.4); }
        .history-card.result-LOSE .history-title-large { color: #8e8e93; }
        .history-card.result-DRAW .history-title-large { color: #34c759; }

        .history-img-box { width: 100%; height: 180px; background: #fff; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #e5e5ea; }
        .history-img-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .history-card.result-WIN img { filter: drop-shadow(0 0 8px rgba(255,204,0,0.6)); border-color: #ffcc00; }
        .history-card.result-LOSE img { filter: grayscale(1) contrast(1.2) brightness(0.7); }
        .history-card.result-DRAW img { filter: sepia(0.7) hue-rotate(60deg); }

        .status-bar-bg { width: 100%; height: 8px; background: #e5e5ea; border-radius: 4px; overflow: hidden; margin: 4px 0 10px; }
        .status-bar-fill { height: 100%; width: 0; transition: width 0.5s; }
    </style>
</head>
<body>

    <header>
        <h1 id="headerTitle">⚔️ コスファイ戦記</h1>
        <div style="display:flex; gap:6px;">
            <button class="btn" onclick="exportData()" style="color: #007aff; padding:4px;">📥書き出し</button>
            <button class="btn" onclick="document.getElementById('importFile').click()" style="color: #34c759; padding:4px;">📤読込</button>
            <input type="file" id="importFile" style="display:none;" onchange="importData(event)">
            <button class="btn btn-secondary" id="effectToggleBtn" style="margin-left:4px;">🎭演出: ON</button>
            <button class="btn btn-primary" id="addFighterBtn">新規参戦</button>
        </div>
    </header>

    <main>
        <input type="text" id="searchInput" class="search-input" placeholder="ファイター名やテーマで検索..." oninput="renderList()">
        <div id="listContainer" class="list-container"></div>
    </main>

    <div id="formModal" class="modal" onclick="if(event.target.id==='formModal')closeModal('formModal')">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-size:18px; font-weight:900;" id="formTitle">キャラクター登録</span>
                <button class="btn" onclick="closeModal('formModal')">閉じる</button>
            </div>
            <div id="zukanForm">
                <input type="hidden" id="itemId">
                
                <div class="form-group">
                    <label>キャラクター画像</label>
                    <button type="button" class="btn btn-secondary" style="width:100%; padding:12px; border:1px dashed #ccc;" id="addMainImgBtn">📷 画像を追加する</button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="addMainImage(event)">
                    <div id="formImagesContainer" class="image-list-builder"></div>
                </div>

                <div class="form-group">
                    <label>名前・二つ名</label>
                    <input type="text" id="itemTitle" class="form-control" placeholder="ファイターの名前">
                </div>
                <div class="form-group">
                    <label>テーマ</label>
                    <input type="text" id="itemTheme" class="form-control" placeholder="例: 魔法少女、サイボーグ">
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;"><label>総勝ち数</label><input type="number" id="winCount" class="form-control" value="0" min="0"></div>
                    <div style="flex:1;"><label>総負け数</label><input type="number" id="lossCount" class="form-control" value="0" min="0"></div>
                </div>

                <div class="form-group">
                    <label>ステータス (ATK / DEF / SPD / 戦闘IQ)</label>
                    <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:6px;">
                        <input type="number" id="statAtk" class="form-control" placeholder="ATK" value="50" max="100">
                        <input type="number" id="statDef" class="form-control" placeholder="DEF" value="50" max="100">
                        <input type="number" id="statSpd" class="form-control" placeholder="SPD" value="50" max="100">
                        <input type="number" id="statInt" class="form-control" placeholder="戦闘IQ" value="50" max="100">
                    </div>
                </div>

                <div class="form-group" style="margin-top:20px; background:#fafafa; padding:12px; border-radius:12px; border:1px solid #e5e5ea;">
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                            <label style="margin:0;">⚔️ 攻撃方法（複数追加可）</label>
                            <button type="button" class="btn btn-primary" style="padding:4px 10px; font-size:12px;" onclick="addAttackMethodRow()">＋追加</button>
                        </div>
                        <div id="formAttackMethodsContainer"></div>
                    </div>
                    <div class="form-group">
                        <label>🛡️ 戦法</label>
                        <input type="text" id="battleStrategy" class="form-control" placeholder="例: ヒット＆アウェイ、正面突破など">
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; margin-top:16px;">
                        <label style="margin:0;">🔥 必殺技（複数追加可）</label>
                        <button type="button" class="btn btn-primary" style="padding:4px 10px; font-size:12px;" onclick="addSkillRow()">＋追加</button>
                    </div>
                    <div id="formSkillsContainer"></div>

                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; margin-top:16px;">
                        <label style="margin:0;">⚠️ 弱点（複数追加可）</label>
                        <button type="button" class="btn btn-primary" style="padding:4px 10px; font-size:12px; background:#3a3a3c;" onclick="addWeaknessRow()">＋追加</button>
                    </div>
                    <div id="formWeaknessesContainer"></div>
                </div>

                <div class="form-group" style="margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <label style="margin:0;">📜 詳細な戦闘履歴（複数追加可能）</label>
                        <button type="button" class="btn btn-primary" style="padding:4px 10px; font-size:12px;" id="addHistoryRowBtn">＋戦記を追加</button>
                    </div>
                    <div id="formHistoryContainer"></div>
                </div>

                <div class="form-group" style="margin-top:20px; background:#ffebee; padding:12px; border-radius:12px; border:1px solid #ffcdd2;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom:0;">
                        <input type="checkbox" id="isVillain" onchange="toggleVillainField()" style="width:18px; height:18px;">
                        <span style="font-size:14px; font-weight:900; color:#c62828;">👿 悪役として登録する</span>
                    </label>
                    <div id="villainActionContainer" style="display:none; margin-top:12px;">
                        <label style="color:#c62828;">敗北したヒロインに行う行為</label>
                        <textarea id="villainAction" class="form-control" placeholder="ヒロインに対する処遇や行為を入力..." style="height:80px;"></textarea>
                    </div>
                </div>

                <button type="button" id="submitDataBtn" class="btn btn-primary" style="width:100%; padding:16px; margin-top:15px; font-size:16px; font-weight:800;">データに保存</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal" onclick="if(event.target.id==='detailModal')closeModal('detailModal')">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-size:16px; font-weight:800;" id="detailModeLabel">CHARACTER DETAIL</span>
                <button class="btn" onclick="closeModal('detailModal')">閉じる</button>
            </div>
            
            <div class="detail-img-slider">
                <button class="slide-btn" style="left:10px;" id="slidePrevBtn">◀</button>
                <img id="detailImg" src="">
                <button class="slide-btn" style="right:10px;" id="slideNextBtn">▶</button>
                <div id="sliderBadge" style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); color:#fff; padding:2px 8px; font-size:11px; border-radius:10px;">1/1</div>
            </div>

            <h2 id="detailName" style="font-size:24px; font-weight:900;"></h2>
            <div id="detailTheme" style="font-size:14px; color:var(--accent-color); font-weight:700; margin-bottom:14px;"></div>

            <div style="display:flex; gap:10px; text-align:center; margin-bottom:16px;">
                <div style="flex:1; background:#f2f2f7; padding:8px; border-radius:10px;"><span id="detailWins" style="font-size:20px; font-weight:900; color:var(--color-cool);">0</span><br><span style="font-size:10px; color:var(--text-sub);">WINS</span></div>
                <div style="flex:1; background:#f2f2f7; padding:8px; border-radius:10px;"><span id="detailLosses" style="font-size:20px; font-weight:900; color:var(--danger-color);">0</span><br><span style="font-size:10px; color:var(--text-sub);">LOSSES</span></div>
            </div>

            <div id="detailStatsBox" style="background:#f2f2f7; padding:12px; border-radius:14px; margin-bottom:16px;"></div>

            <div id="detailAttackStrategy" style="margin-bottom:16px; font-size:14px; line-height:1.6;"></div>

            <div id="detailSkillsWeaknesses" style="margin-bottom:20px;"></div>

            <div id="detailVillainAction" style="margin-bottom:20px;"></div>

            <h3 style="font-size:15px; font-weight:800; margin-bottom:10px;">📜 過去の戦闘ログ</h3>
            <div id="detailHistoryContainer"></div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="flex:1; background:#e5e5ea; color:#1c1c1e;" id="editBtn">データ修整</button>
                <button class="btn btn-danger" style="flex:1; background:rgba(255,59,48,0.1);" id="deleteBtn">完全抹消</button>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = "CosfiSafeDB_V1"; 
        const STORE_NAME = "fighters";
        let db = null;
        let charData = [];
        let currentImages = []; 
        let activeSlideIdx = 0; 
        let activeDetailImages = []; 

        document.addEventListener('DOMContentLoaded', () => {
            try {
                if(localStorage.getItem('effectsDisabled') === 'true') {
                    document.body.classList.add('effects-off');
                    document.getElementById('effectToggleBtn').textContent = "🎭演出: OFF";
                }
            } catch(e) {}

            document.getElementById('effectToggleBtn').addEventListener('click', toggleEffects);
            document.getElementById('addFighterBtn').addEventListener('click', openFormModal);
            document.getElementById('addMainImgBtn').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('addHistoryRowBtn').addEventListener('click', () => addHistoryRow());
            document.getElementById('slidePrevBtn').addEventListener('click', () => changeSlide(-1));
            document.getElementById('slideNextBtn').addEventListener('click', () => changeSlide(1));
            document.getElementById('submitDataBtn').addEventListener('click', saveItem);

            document.getElementById('headerTitle').addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

            initDB();
        });

        function toggleEffects() {
            const isOff = document.body.classList.toggle('effects-off');
            try { localStorage.setItem('effectsDisabled', isOff); } catch(e) {}
            document.getElementById('effectToggleBtn').textContent = isOff ? "🎭演出: OFF" : "🎭演出: ON";
        }

        // 📦 データをJSONファイルとしてダウンロード (画質を維持してBase64化)
        function exportData() {
            if (charData.length === 0) { alert("保存するデータがありません。"); return; }
            
            const toBase64 = (buf) => {
                if (!buf) return null;
                let binary = '';
                const bytes = new Uint8Array(buf);
                for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                return window.btoa(binary);
            };

            const exportJson = charData.map(c => {
                const cloned = { ...c };
                cloned._restoredBlobs = undefined;
                cloned._cachedUrls = undefined;
                if (cloned.images) {
                    cloned.images = cloned.images.map(img => ({
                        ...img,
                        buffer: img.buffer ? toBase64(img.buffer) : null,
                        isBase64: true
                    }));
                }
                if (cloned.histories) {
                    cloned.histories = cloned.histories.map(h => ({
                        ...h,
                        _restoredBlob: undefined,
                        _cachedUrl: undefined,
                        image: h.image ? { ...h.image, buffer: h.image.buffer ? toBase64(h.image.buffer) : null, isBase64: true } : null
                    }));
                }
                return cloned;
            });

            const blob = new Blob([JSON.stringify(exportJson)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Cosfi_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        // 📂 ファイルからデータを復元 (Base64からバイナリへ戻す)
        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const fromBase64 = (base64) => {
                if (!base64) return null;
                const binaryString = window.atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                return bytes.buffer;
            };

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    
                    imported.forEach(c => {
                        if (c.images) {
                            c.images.forEach(img => {
                                if (img.isBase64 && typeof img.buffer === 'string') {
                                    img.buffer = fromBase64(img.buffer);
                                    delete img.isBase64;
                                }
                            });
                        }
                        if (c.histories) {
                            c.histories.forEach(h => {
                                if (h.image && h.image.isBase64 && typeof h.image.buffer === 'string') {
                                    h.image.buffer = fromBase64(h.image.buffer);
                                    delete h.image.isBase64;
                                }
                            });
                        }
                    });

                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    store.clear();
                    imported.forEach(item => store.add(item));
                    
                    transaction.oncomplete = () => {
                        alert("データの読み込みが完了しました！");
                        fetchAll();
                    };
                } catch(err) {
                    alert("ファイル形式が不正です。");
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function initDB() {
            try {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; fetchAll(); };
                request.onerror = (e) => { alert("データベースの起動に失敗しました。"); };
            } catch(e) { alert("環境によりデータ保存ができません。"); }
        }

        async function processImageForStorage(fileOrBlob) {
            if (!fileOrBlob) return null;
            if (fileOrBlob.buffer) return fileOrBlob; 
            try {
                const buffer = await fileOrBlob.arrayBuffer();
                return { buffer: buffer, type: fileOrBlob.type };
            } catch(e) { return null; }
        }

        function restoreImageToBlob(data) {
            if (!data) return null;
            if (data instanceof Blob) return data; 
            if (data.buffer) return new Blob([data.buffer], { type: data.type });
            return null;
        }

        function fetchAll() {
            if(!db) return;
            const transaction = db.transaction(STORE_NAME, "readonly");
            transaction.objectStore(STORE_NAME).getAll().onsuccess = (e) => {
                charData.forEach(c => {
                    if(c._cachedUrls) c._cachedUrls.forEach(u => URL.revokeObjectURL(u));
                    if(c.histories) c.histories.forEach(h => { if(h._cachedUrl) URL.revokeObjectURL(h._cachedUrl); });
                });

                charData = e.target.result || [];

                charData.forEach(c => {
                    c._restoredBlobs = (c.images || []).map(restoreImageToBlob).filter(b => b);
                    c._cachedUrls = c._restoredBlobs.map(b => URL.createObjectURL(b));

                    if(c.histories) {
                        c.histories.forEach(h => {
                            const blob = restoreImageToBlob(h.image);
                            h._restoredBlob = blob;
                            if(blob) h._cachedUrl = URL.createObjectURL(blob);
                        });
                    }
                });
                renderList();
            };
        }

        function getModeClass(w, l) {
            if(w === 0 && l === 0) return 'mode-none';
            if(w > 0 && l === 0) return 'mode-god';
            if(w > l) return 'mode-cool';
            if(w === l) return 'mode-draw';
            if(l >= w * 2 && l > 0) return 'mode-abyss';
            return 'mode-struggle';
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = "";

            const filtered = charData.filter(c => c.title.toLowerCase().includes(keyword) || (c.theme && c.theme.toLowerCase().includes(keyword)));

            filtered.sort((a,b) => b.id - a.id).forEach(c => {
                const card = document.createElement('div');
                card.className = `card ${getModeClass(c.wins, c.losses)}`;
                card.onclick = () => openDetail(c.id);

                const mainImg = (c._cachedUrls && c._cachedUrls.length > 0) ? c._cachedUrls[0] : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23fff"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="10" fill="%23ccc">NO IMAGE</text></svg>';

                card.innerHTML = `
                    <div class="card-img-wrapper"><img src="${mainImg}" loading="lazy"></div>
                    <div class="card-info">
                        <div class="card-title">${escapeHtml(c.title)}</div>
                        <div style="font-size:12px; color:var(--text-sub); font-weight:600; margin-top:2px;">${c.wins}勝 ${c.losses}敗 / テーマ: ${escapeHtml(c.theme || '未設定')}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addMainImage(e) {
            const file = e.target.files[0];
            if(!file) return;
            const previewUrl = URL.createObjectURL(file);
            currentImages.push({ blob: file, url: previewUrl });
            renderFormImages();
            e.target.value = '';
        }

        function renderFormImages() {
            const container = document.getElementById('formImagesContainer');
            container.innerHTML = '';
            currentImages.forEach((imgObj, idx) => {
                const div = document.createElement('div');
                div.className = 'image-thumb-box';
                div.innerHTML = `<img src="${imgObj.url}"><button type="button" class="del-thumb-btn">✕</button>`;
                div.querySelector('.del-thumb-btn').addEventListener('click', () => {
                    URL.revokeObjectURL(imgObj.url);
                    currentImages.splice(idx, 1);
                    renderFormImages();
                });
                container.appendChild(div);
            });
        }

        function addAttackMethodRow(val = '') {
            const container = document.getElementById('formAttackMethodsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row attack-method-row';
            row.innerHTML = `<input type="text" class="form-control attack-method-input" placeholder="例: 物理打撃、遠隔魔法など" value="${escapeHtml(val)}"><button type="button" class="btn btn-danger" onclick="this.parentElement.remove()" style="padding:0 12px;">✕</button>`;
            container.appendChild(row);
        }

        function addSkillRow(val = '') {
            const container = document.getElementById('formSkillsContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row skill-row';
            row.innerHTML = `<input type="text" class="form-control skill-input" placeholder="必殺技名" value="${escapeHtml(val)}"><button type="button" class="btn btn-danger" onclick="this.parentElement.remove()" style="padding:0 12px;">✕</button>`;
            container.appendChild(row);
        }

        function addWeaknessRow(val = '') {
            const container = document.getElementById('formWeaknessesContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-row weakness-row';
            row.innerHTML = `<input type="text" class="form-control weakness-input" placeholder="弱点" value="${escapeHtml(val)}"><button type="button" class="btn btn-danger" onclick="this.parentElement.remove()" style="padding:0 12px;">✕</button>`;
            container.appendChild(row);
        }

        function addHistoryRow(data = null) {
            const container = document.getElementById('formHistoryContainer');
            const row = document.createElement('div');
            row.className = 'dynamic-history-row';
            
            row._blob = data?._restoredBlob || null;
            row._previewUrl = data?._cachedUrl || '';
            
            row.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-size:12px; font-weight:800; color:var(--accent-color);">対戦ログ</span>
                    <button type="button" class="btn btn-danger del-row-btn" style="padding:2px 6px; font-size:11px;">削除</button>
                </div>
                <div class="form-group" style="margin-bottom:8px;">
                    <input type="text" class="form-control history-battle-title" placeholder="戦闘の題名 (例: 宿命のライバルとの死闘)" value="${escapeHtml(data?.battleTitle || '')}">
                </div>
                <div class="form-group">
                    <select class="form-control history-result">
                        <option value="WIN" ${data?.result==='WIN'?'selected':''}>VICTORY (勝利)</option>
                        <option value="LOSE" ${data?.result==='LOSE'?'selected':''}>DEFEAT (敗北)</option>
                        <option value="DRAW" ${data?.result==='DRAW'?'selected':''}>DRAW (引き分け)</option>
                    </select>
                </div>
                <div class="form-group">
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button type="button" class="btn btn-secondary history-img-trigger" style="font-size:12px;">📷 履歴画像</button>
                        <input type="file" accept="image/*" class="history-file-input" style="display:none;">
                        <div class="history-img-preview" style="width:50px; height:50px; background:#fff; border-radius:6px; border:1px solid #ccc; overflow:hidden; display:${row._previewUrl?'block':'none'}">
                            <img src="${row._previewUrl}" style="width:100%; height:100%; object-fit:contain;">
                        </div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <textarea class="form-control history-text" placeholder="戦闘の詳細文章を入力..." style="height:70px; font-size:14px;">${data?.text || ''}</textarea>
                </div>
            `;

            row.querySelector('.del-row-btn').addEventListener('click', () => row.remove());
            const fileInput = row.querySelector('.history-file-input');
            row.querySelector('.history-img-trigger').addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const url = URL.createObjectURL(file);
                row._blob = file;
                row._previewUrl = url;
                const prevBox = row.querySelector('.history-img-preview');
                prevBox.style.display = 'block';
                prevBox.querySelector('img').src = url;
            });
            container.appendChild(row);
        }

        function toggleVillainField() {
            const isChecked = document.getElementById('isVillain').checked;
            document.getElementById('villainActionContainer').style.display = isChecked ? 'block' : 'none';
        }

        async function saveItem() {
            if (!db) { alert("データベースに接続されていません。"); return; }
            
            try {
                const id = document.getElementById('itemId').value;
                const titleVal = document.getElementById('itemTitle').value.trim();
                
                if(!titleVal) {
                    alert("⚠️ 名前・二つ名を入力してください。");
                    return;
                }

                const submitBtn = document.getElementById('submitDataBtn');
                submitBtn.textContent = "高画質で保存中...";
                submitBtn.disabled = true;

                const attackMethods = Array.from(document.querySelectorAll('.attack-method-input')).map(input => input.value.trim()).filter(v => v);
                const battleStrategy = document.getElementById('battleStrategy').value.trim();
                const isVillain = document.getElementById('isVillain').checked;
                const villainAction = document.getElementById('villainAction').value.trim();

                const skills = Array.from(document.querySelectorAll('.skill-input')).map(input => input.value.trim()).filter(v => v);
                const weaknesses = Array.from(document.querySelectorAll('.weakness-input')).map(input => input.value.trim()).filter(v => v);

                const processedImages = [];
                for (let img of currentImages) {
                    const processed = await processImageForStorage(img.blob);
                    if(processed) processedImages.push(processed);
                }

                const historyRows = document.querySelectorAll('.dynamic-history-row');
                const battleHistories = [];
                for (let row of historyRows) {
                    const processed = await processImageForStorage(row._blob);
                    battleHistories.push({
                        battleTitle: row.querySelector('.history-battle-title').value.trim(),
                        result: row.querySelector('.history-result').value,
                        image: processed,
                        text: row.querySelector('.history-text').value
                    });
                }

                const item = {
                    title: titleVal,
                    theme: document.getElementById('itemTheme').value.trim(),
                    wins: Number(document.getElementById('winCount').value) || 0,
                    losses: Number(document.getElementById('lossCount').value) || 0,
                    atk: Number(document.getElementById('statAtk').value) || 50,
                    def: Number(document.getElementById('statDef').value) || 50,
                    spd: Number(document.getElementById('statSpd').value) || 50,
                    int: Number(document.getElementById('statInt').value) || 50,
                    attackMethods: attackMethods,
                    battleStrategy: battleStrategy,
                    skills: skills,
                    weaknesses: weaknesses,
                    isVillain: isVillain,
                    villainAction: villainAction,
                    images: processedImages,
                    histories: battleHistories
                };

                const trans = db.transaction(STORE_NAME, "readwrite");
                const store = trans.objectStore(STORE_NAME);
                
                if (id) { 
                    item.id = Number(id); 
                    store.put(item); 
                } else { 
                    store.add(item); 
                }

                trans.oncomplete = () => { 
                    closeModal('formModal'); 
                    fetchAll(); 
                };
                trans.onerror = (err) => {
                    alert("❌ 保存に失敗しました: " + err.target.error.message);
                };

            } catch (error) {
                alert("⚠️ システムエラーが発生しました:\n" + error.message);
            } finally {
                const submitBtn = document.getElementById('submitDataBtn');
                submitBtn.textContent = "データに保存";
                submitBtn.disabled = false;
            }
        }

        function openDetail(id) {
            const c = charData.find(x => x.id === id);
            if(!c) return;

            document.getElementById('detailName').textContent = c.title;
            document.getElementById('detailTheme').textContent = c.theme || '未設定';
            document.getElementById('detailWins').textContent = c.wins;
            document.getElementById('detailLosses').textContent = c.losses;
            document.getElementById('detailModeLabel').textContent = `STATUS MODE: ${getModeClass(c.wins, c.losses).replace('mode-','').toUpperCase()}`;

            activeDetailImages = c._cachedUrls || [];
            if(activeDetailImages.length === 0) activeDetailImages.push('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23fff"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="10" fill="%23ccc">NO IMAGE</text></svg>');
            activeSlideIdx = 0;
            updateSliderUI();

            const stats = [
                {label: 'ATK', val: c.atk, col: 'var(--color-atk)'},
                {label: 'DEF', val: c.def, col: 'var(--color-def)'},
                {label: 'SPD', val: c.spd, col: 'var(--color-spd)'},
                {label: '戦闘IQ', val: c.int, col: 'var(--color-int)'}
            ];
            document.getElementById('detailStatsBox').innerHTML = stats.map(s => `
                <div style="font-size:12px; font-weight:800; display:flex; justify-content:space-between; margin-top:4px;"><span>${s.label}</span><span>${s.val}</span></div>
                <div class="status-bar-bg"><div class="status-bar-fill" style="width:${s.val}%; background:${s.col}"></div></div>
            `).join('');

            let asHtml = '';
            if(c.attackMethods && c.attackMethods.length > 0) {
                asHtml += `<div style="margin-bottom:4px;"><span style="font-weight:800; color:var(--text-sub);">⚔️ 攻撃方法:</span> ${c.attackMethods.map(escapeHtml).join('、')}</div>`;
            } else if(c.attackMethod) {
                asHtml += `<div style="margin-bottom:4px;"><span style="font-weight:800; color:var(--text-sub);">⚔️ 攻撃方法:</span> ${escapeHtml(c.attackMethod)}</div>`;
            }
            if(c.battleStrategy) asHtml += `<div><span style="font-weight:800; color:var(--text-sub);">🛡️ 戦法:</span> ${escapeHtml(c.battleStrategy)}</div>`;
            document.getElementById('detailAttackStrategy').innerHTML = asHtml;

            let swHtml = '';
            if(c.skills && c.skills.length > 0) {
                swHtml += `<div style="margin-bottom:12px;"><div style="font-size:13px; font-weight:800; margin-bottom:6px;">🔥 必殺技</div>` + 
                          c.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('') + `</div>`;
            }
            if(c.weaknesses && c.weaknesses.length > 0) {
                swHtml += `<div><div style="font-size:13px; font-weight:800; margin-bottom:6px;">⚠️ 弱点</div>` + 
                          c.weaknesses.map(w => `<span class="weakness-tag">${escapeHtml(w)}</span>`).join('') + `</div>`;
            }
            document.getElementById('detailSkillsWeaknesses').innerHTML = swHtml;

            const vaContainer = document.getElementById('detailVillainAction');
            if(c.isVillain && c.villainAction) {
                vaContainer.innerHTML = `<div style="background:#ffebee; border:1px solid #ffcdd2; padding:12px; border-radius:12px;">
                    <div style="font-size:13px; font-weight:800; color:#c62828; margin-bottom:6px;">👿 敗北したヒロインに行う行為</div>
                    <div style="font-size:14px; white-space:pre-wrap; line-height:1.4;">${escapeHtml(c.villainAction)}</div>
                </div>`;
            } else {
                vaContainer.innerHTML = '';
            }

            const histContainer = document.getElementById('detailHistoryContainer');
            histContainer.innerHTML = '';
            if(!c.histories || c.histories.length === 0) {
                histContainer.innerHTML = '<div style="font-size:13px; color:var(--text-sub); text-align:center; padding:10px;">記録された戦記はありません。</div>';
            } else {
                c.histories.forEach(h => {
                    const hCard = document.createElement('div');
                    hCard.className = `history-card result-${h.result}`;
                    let imgHtml = h._cachedUrl ? `<div class="history-img-box"><img src="${h._cachedUrl}"></div>` : '';
                    let titleHtml = h.battleTitle ? `<div class="battle-title-display">${escapeHtml(h.battleTitle)}</div>` : '';

                    hCard.innerHTML = `
                        <div class="history-title-large">${h.result === 'WIN' ? 'VICTORY' : h.result === 'LOSE' ? 'DEFEAT' : 'DRAW'}</div>
                        ${titleHtml}
                        ${imgHtml}
                        <div style="font-size:14px; color:#2c2c2e; white-space:pre-wrap; line-height:1.4;">${escapeHtml(h.text || '（詳細内容なし）')}</div>
                    `;
                    histContainer.appendChild(hCard);
                });
            }

            document.getElementById('editBtn').onclick = () => openEdit(c);
            document.getElementById('deleteBtn').onclick = () => {
                if(confirm("このファイターの全データを完全に抹消しますか？")) {
                    db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(c.id).oncomplete = () => { closeModal('detailModal'); fetchAll(); };
                }
            };
            openModal('detailModal');
        }

        function updateSliderUI() {
            document.getElementById('detailImg').src = activeDetailImages[activeSlideIdx];
            document.getElementById('sliderBadge').textContent = `${activeSlideIdx + 1} / ${activeDetailImages.length}`;
        }

        function changeSlide(dir) {
            activeSlideIdx += dir;
            if(activeSlideIdx < 0) activeSlideIdx = activeDetailImages.length - 1;
            if(activeSlideIdx >= activeDetailImages.length) activeSlideIdx = 0;
            updateSliderUI();
        }

        function openEdit(c) {
            closeModal('detailModal');
            document.getElementById('formTitle').textContent = "戦記の修整";
            document.getElementById('itemId').value = c.id;
            document.getElementById('itemTitle').value = c.title;
            document.getElementById('itemTheme').value = c.theme || '';
            document.getElementById('winCount').value = c.wins;
            document.getElementById('lossCount').value = c.losses;
            document.getElementById('statAtk').value = c.atk;
            document.getElementById('statDef').value = c.def;
            document.getElementById('statSpd').value = c.spd;
            document.getElementById('statInt').value = c.int;

            document.getElementById('battleStrategy').value = c.battleStrategy || '';
            document.getElementById('isVillain').checked = !!c.isVillain;
            document.getElementById('villainAction').value = c.villainAction || '';
            toggleVillainField();

            document.getElementById('formAttackMethodsContainer').innerHTML = '';
            if(c.attackMethods && c.attackMethods.length > 0) {
                c.attackMethods.forEach(a => addAttackMethodRow(a));
            } else if(c.attackMethod) {
                addAttackMethodRow(c.attackMethod);
            } else {
                addAttackMethodRow();
            }

            document.getElementById('formSkillsContainer').innerHTML = '';
            if(c.skills) c.skills.forEach(s => addSkillRow(s));
            
            document.getElementById('formWeaknessesContainer').innerHTML = '';
            if(c.weaknesses) c.weaknesses.forEach(w => addWeaknessRow(w));

            currentImages = (c._restoredBlobs || []).map((b, idx) => ({ blob: b, url: c._cachedUrls[idx] }));
            renderFormImages();

            document.getElementById('formHistoryContainer').innerHTML = '';
            if(c.histories) c.histories.forEach(h => addHistoryRow(h));

            openModal('formModal');
        }

        function openFormModal() {
            document.getElementById('formTitle').textContent = "キャラクター登録";
            document.getElementById('itemId').value = "";
            document.getElementById('itemTitle').value = "";
            document.getElementById('itemTheme').value = "";
            document.getElementById('winCount').value = 0;
            document.getElementById('lossCount').value = 0;
            document.getElementById('statAtk').value = 50;
            document.getElementById('statDef').value = 50;
            document.getElementById('statSpd').value = 50;
            document.getElementById('statInt').value = 50;
            
            document.getElementById('battleStrategy').value = "";
            document.getElementById('isVillain').checked = false;
            document.getElementById('villainAction').value = "";
            toggleVillainField();

            document.getElementById('formAttackMethodsContainer').innerHTML = '';
            addAttackMethodRow();

            document.getElementById('formSkillsContainer').innerHTML = '';
            document.getElementById('formWeaknessesContainer').innerHTML = '';
            currentImages = [];
            document.getElementById('formImagesContainer').innerHTML = '';
            document.getElementById('formHistoryContainer').innerHTML = '';
            
            addSkillRow();
            addWeaknessRow();

            openModal('formModal');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
